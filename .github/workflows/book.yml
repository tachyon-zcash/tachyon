name: Book

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mdbook and plugins
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2
        with:
          tool: mdbook@0.4.52,mdbook-katex@0.9.4,mdbook-mermaid@0.16.2

      - name: Build book
        run: mdbook build book/

  notify-website:
    name: Notify website to deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger repository_dispatch in website
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: tachyon-zcash/website
          event-type: book_updated
          client-payload: |
            { "book_sha": "${{ github.sha }}" }
