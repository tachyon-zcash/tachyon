name: Book

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install mdbook and plugins
        uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: mdbook@0.4.52,mdbook-katex@0.9.4,mdbook-mermaid@0.16.2

      - name: Build book
        run: mdbook build book/

  notify-website:
    name: Notify website to deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger repository_dispatch in website
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: tachyon-zcash/website
          event-type: book_updated
          client-payload: |
            { "book_sha": "${{ github.sha }}" }
